version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pw_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123 # Placeholder password, change if needed
      POSTGRES_DB: portfolio_db
    ports:
      - "5433:5432" # Host port 5433 maps to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
